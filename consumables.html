<style>

  .sec{padding:20px 26px;border-top:1px solid #f1f5f9}

  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:9px 10px;text-align:right;border-bottom:1px solid #f1f5f9;white-space:nowrap}
  th{background:#f8fafc;color:#475569;font-weight:700;font-size:12px;text-align:right}
  th:first-child,td:first-child{text-align:left}
  td.lbl{font-weight:700;color:#0f172a;text-align:left}
  tr.sum td{background:#eff6ff;font-weight:800}
  .pos{color:#dc2626}.neg{color:#2563eb}
  .muted{color:#94a3b8}
  .sub{font-size:11px;color:#94a3b8;margin-top:4px}
  .bar{height:7px;background:#e2e8f0;border-radius:4px;overflow:hidden;min-width:80px;display:inline-block;vertical-align:middle}

<script>
// ── 설정 ──────────────────────────────────────────────
var SUPABASE_URL='https://bdkurlqmfsswgeiujyev.supabase.co';
var SUPABASE_ANON='sb_publishable_pOXTPRPFUESBxgXBAo9mBg_zaW5jID3';
if(typeof supabase==='undefined'){var v=document.getElementById('veil');if(v)v.innerHTML='⚠️ 스크립트 로드 실패 — 네트워크 확인 후 <a href="javascript:location.reload()">새로고침</a>';throw new Error('supabase cdn load failed');}
var _sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
var _currentUser = null;

// ── 포맷 헬퍼 ─────────────────────────────────────────
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg){var t=document.createElement('div');t.textContent=msg;t.style.cssText='position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:9998;box-shadow:0 6px 20px rgba(0,0,0,.3);max-width:90vw;text-align:center';document.body.appendChild(t);setTimeout(function(){t.style.transition='opacity .4s';t.style.opacity='0';setTimeout(function(){t.remove();},400);},2800);}
function fmtWon(n){
  if(n==null || n==='' || n==='-') return '-';
  n = Number(n); if(isNaN(n)) return '-';
  if(Math.abs(n) >= 1e8) return (n/1e8).toFixed(1)+'억';
  if(Math.abs(n) >= 1e4) return Math.round(n/1e4).toLocaleString()+'만';
  return Math.round(n).toLocaleString();
}
function fmtWonFull(n){ n=Number(n); return isNaN(n)?'-':Math.round(n).toLocaleString()+'원'; }
function fmtPct(r){
  if(r==null || r==='' || r==='-') return '-';
  r = Number(r); if(isNaN(r)) return '-';
  return (r*100).toFixed(1)+'%';
}
function fmtVs(r){ // 증감률 색상
  if(r==null || r==='' || r==='-') return '<span class="muted">-</span>';
  r = Number(r); if(isNaN(r)) return '<span class="muted">-</span>';
  var p=(r*100).toFixed(1)+'%';
  if(r>0) return '<span class="pos">▲ '+p+'</span>';
  if(r<0) return '<span class="neg">▼ '+Math.abs(r*100).toFixed(1)+'%</span>';
  return '<span class="muted">0%</span>';
}
function num(v){ return (typeof v==='number')?v:(parseFloat(v)||0); }
function fmtDate(v){
  if(v instanceof Date) return v.getFullYear()+'-'+String(v.getMonth()+1).padStart(2,'0')+'-'+String(v.getDate()).padStart(2,'0');
  if(typeof v==='number'){ // 엑셀 시리얼
    var d=new Date(Math.round((v-25569)*86400*1000));
    return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0');
  }
  return v? String(v).slice(0,10) : '';
}

// ── 엑셀 파싱 (TIP 시트) ───────────────────────────────
function parseTIP(wb){
  var ws = wb.Sheets['TIP'];
  if(!ws) throw new Error("'TIP' 시트를 찾을 수 없습니다. 소모품 매출 엑셀이 맞는지 확인해주세요.");
  var g = XLSX.utils.sheet_to_json(ws, {header:1, raw:true, defval:null});
  function findRow(marker, from){
    for(var i=(from||0); i<g.length; i++){
      var row=g[i]||[];
      for(var j=0;j<row.length;j++){ if(row[j]!=null && String(row[j]).indexOf(marker)>=0) return i; }
    }
    return -1;
  }
  function C(r,c){ var row=g[r]||[]; return row[c]; }

  var R={};
  // 보고일자
  var rd=findRow('보고일자');
  R.date = rd>=0 ? fmtDate(C(rd,3)) : '';

  // 1. 일 매출 현황 — 국내/해외/합계 + vs
  var s1=findRow('1. 일 매출 현황');
  function row6(r){ return {label:C(r,1), today:num(C(r,3)), prevDay:num(C(r,4)), prevMonthAvg:num(C(r,5)), ytdAvg:num(C(r,6)), monthTargetAvg:num(C(r,7)), lastYearAvg:num(C(r,8))}; }
  function vs6(r){ return {label:C(r,1), prevDay:C(r,4), prevMonthAvg:C(r,5), ytdAvg:C(r,6), monthTargetAvg:C(r,7), lastYearAvg:C(r,8)}; }
  R.daily={ domestic:row6(s1+2), overseas:row6(s1+3), total:row6(s1+4),
            vsDom:vs6(s1+5), vsInt:vs6(s1+6), vsTot:vs6(s1+7) };

  // 2. 당월 매출 Progress
  var s2=findRow('2. 당월 매출 Progress');
  if(s1<0||s2<0) throw new Error("'일 매출 현황' 또는 'Progress' 섹션을 찾을 수 없습니다. 소모품 보고서 양식인지 확인해주세요.");
  function prog(r){ return {label:C(r,1), cum:num(C(r,3)), target:num(C(r,4)), achieve:C(r,5), progress:C(r,6), remain:num(C(r,7))}; }
  R.progress={ domestic:prog(s2+2), overseas:prog(s2+3), total:prog(s2+4) };

  // 3-1. 병원별
  var sh=findRow('1) 병원별');
  var hStart=sh+3; // 헤더 2줄 뒤
  R.hospitals=[];
  for(var i=hStart;i<g.length;i++){
    var name=C(i,1);
    if(name==null || String(name).trim()==='') break;
    if(String(name).indexOf('합계')>=0){ R.hospTotal={xF:num(C(i,3)),xE:num(C(i,4)),xS:num(C(i,5)),oF:num(C(i,6)),oE:num(C(i,7)),oS:num(C(i,8)),tip:num(C(i,9))}; break; }
    R.hospitals.push({name:String(name), xF:num(C(i,3)),xE:num(C(i,4)),xS:num(C(i,5)),oF:num(C(i,6)),oE:num(C(i,7)),oS:num(C(i,8)),tip:num(C(i,9))});
  }

  // 3-2. 품목별 (국내/해외 × 4품목 × 수량/금액). 그룹 라벨은 병합셀이라 carry-forward
  var sp=findRow('2) 품목별');
  R.products=[];
  if(sp>=0){
    var pStart=-1;
    for(var z=sp+1; z<sp+8 && z<g.length; z++){
      var it=C(z,2);
      if(it!=null && (String(it).indexOf('Face')>=0 || String(it).indexOf('Eye')>=0)){ pStart=z; break; }
    }
    if(pStart>=0){
      var curGrp='';
      for(var k=pStart;k<g.length;k++){
        var item=C(k,2);
        if(item==null || (String(item).indexOf('Face')<0 && String(item).indexOf('Eye')<0)) break;
        var grp=C(k,1); if(grp!=null && String(grp).trim()!=='') curGrp=String(grp).replace(/\n/g,' ');
        R.products.push({ grp:curGrp, item:String(item),
          qToday:num(C(k,3)), qPrev:num(C(k,4)), qCum:num(C(k,5)), qLast:num(C(k,6)),
          amtToday:num(C(k,7)), amtCum:num(C(k,8)), amtLast:num(C(k,9)) });
      }
    }
  }
  // ── 4. TIP 판매 Trend (일별/주별/연간) ──
  function capBlock(hdr,n){
    var H=[]; for(var k=0;k<n;k++) H.push(C(hdr,3+k));
    var rows=[];
    for(var i=hdr+1;i<g.length;i++){
      var lbl=C(i,1);
      if(lbl==null || String(lbl).trim()==='' || String(lbl).charAt(0)==='*') break;
      var vals=[]; for(var kk=0;kk<n;kk++) vals.push(C(i,3+kk));
      rows.push({label:String(lbl), vals:vals});
    }
    return {header:H, rows:rows};
  }
  var d1=findRow('1) 일별 Trend'), d2=findRow('2) 주별 Trend'), d3=findRow('3) 연간 Trend');
  R.trend={};
  if(d1>=0) R.trend.daily=capBlock(d1+1,7);
  if(d2>=0) R.trend.weekly=capBlock(d2+1,6);
  if(d3>=0) R.trend.yearly=capBlock(d3+1,7);

  // ── 5. 국내 올해 상위 구매처 ──
  var s5=findRow('5. 국내 올해 상위');
  R.topAccounts=[];
  if(s5>=0){
    for(var ti=s5+2;ti<g.length;ti++){
      var nm=C(ti,1);
      if(nm==null || String(nm).trim()==='') break;
      R.topAccounts.push({ name:String(nm), cur:C(ti,4), prior:C(ti,5), vs:C(ti,6), priorYear:C(ti,7) });
    }
  }

  R.uploadedAt = new Date().toISOString();
  return R;
}

// ── 월별 차트 데이터 파싱 (국내G/해외G/목표) ──────────────
function _isActual(v){ return typeof v==='number' && v % 1 === 0 && v >= 50; }
function parseGSheet(wb, sheetName){
  var ws=wb.Sheets[sheetName]; if(!ws) return null;
  var g=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:null});
  var blocks=[], cur=null;
  for(var i=0;i<g.length;i++){
    var row=g[i]||[], lbl=row[1];
    if(lbl==null) continue;
    var s=String(lbl);
    if(s.indexOf('년')>=0 && /\d/.test(s)){ cur={x:{},o:{}}; blocks.push(cur); }
    else if(s.indexOf('월')>=0 && cur){
      var m=parseInt(s,10);
      if(m>=1 && m<=12){
        if(typeof row[4]==='number') cur.x[m]=row[4];   // 애니젠X 합계
        if(typeof row[7]==='number') cur.o[m]=row[7];   // 애니젠 합계
      }
    }
  }
  // 실적 블록만 (정수 & 50 이상 값 존재 → 목표비/비율 블록 제외)
  var ib=blocks.filter(function(b){
    var vals=[]; for(var k in b.x) vals.push(b.x[k]); for(var k2 in b.o) vals.push(b.o[k2]);
    return vals.some(_isActual);
  });
  var c=ib[ib.length-1]||{x:{},o:{}}, p=ib[ib.length-2]||{x:{},o:{}};
  function arr(o){ var a=[]; for(var m=1;m<=12;m++) a.push(o[m]!=null?o[m]:null); return a; }
  return { xA:arr(c.x), xP:arr(p.x), oA:arr(c.o), oP:arr(p.o) };
}
function parseTargets(wb){
  var ws=wb.Sheets['목표']; if(!ws) return null;
  // 목표 시트는 데이터 범위가 B열부터 시작 → header:1 인덱스가 어긋남.
  // 절대 셀 주소로 읽기 (월별 1~12 = 5~16행, 국내X=B 국내O=D 해외X=G 해외O=I)
  function col(letter){ var a=[]; for(var r=5;r<=16;r++){ var c=ws[letter+r]; a.push(c&&typeof c.v==='number'?c.v:null); } return a; }
  return { dX:col('B'), dO:col('D'), iX:col('G'), iO:col('I') };
}
// G래프 시트: 카세트(국내/해외)·Fiber 데이터 (26목표/26실적/25년이 정리돼 있음)
function parseGraphSheet(wb){
  var ws=wb.Sheets['G래프']; if(!ws) return [];
  var g=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:null});
  var h=-1;
  for(var i=0;i<g.length;i++){ var r=g[i]||[]; if(r[0]==='월' && String(r[2]||'').indexOf('수량')>=0){ h=i; break; } }
  if(h<0) return [];
  function series(tc,ac,pc){
    var t=[],a=[],p=[];
    for(var m=0;m<12;m++){ var row=g[h+1+m]||[];
      t.push(typeof row[tc]==='number'?row[tc]:null);
      a.push(typeof row[ac]==='number'?row[ac]:null);
      p.push(typeof row[pc]==='number'?row[pc]:null);
    }
    return {target:t, actual:a, prior:p};
  }
  var cd=series(1,2,5), ci=series(9,10,13), fb=series(16,17,20);
  return [
    {title:'국내 카세트 월 판매량 (회계기준)', actual:cd.actual, prior:cd.prior, target:cd.target, color:'#dc2626'},
    {title:'해외 카세트 월 판매량 (회계기준)', actual:ci.actual, prior:ci.prior, target:ci.target, color:'#dc2626'},
    {title:'Fiber 월 판매량 (회계기준)',           actual:fb.actual, prior:fb.prior, target:fb.target, color:'#fb923c'}
  ];
}
function parseAllCharts(wb){
  try{
    var dom=parseGSheet(wb,'국내G'), intl=parseGSheet(wb,'해외G'), t=parseTargets(wb);
    var charts=[];
    if(dom&&intl&&t){
      charts.push(
        {title:'국내 애니젠 X, Immuno 키트 월 판매량 (출고기준)', actual:dom.xA, prior:dom.xP, target:t.dX, color:'#f97316'},
        {title:'국내 애니젠 키트 월 판매량 (출고기준)',        actual:dom.oA, prior:dom.oP, target:t.dO, color:'#f97316'},
        {title:'해외 애니젠 X, Immuno 키트 월 판매량 (회계기준)', actual:intl.xA, prior:intl.xP, target:t.iX, color:'#f97316'},
        {title:'해외 애니젠 키트 월 판매량 (회계기준)',        actual:intl.oA, prior:intl.oP, target:t.iO, color:'#f97316'}
      );
    }
    charts=charts.concat(parseGraphSheet(wb));
    return charts;
  }catch(e){ console.warn('차트 파싱 실패:', e); return []; }
}

// ══ 노바몰 마감(raw) → 국내 진단키트 매출 ═══════════════════
var WOM_GRPS=['애니젠 Face','애니젠 Eye','X/Immuno Face','X/Immuno Eye','카세트','Cooling','리턴스트립','커플링시약','기타'];
function womGrp(name){
  name=String(name||'');
  if(/Cartridge/i.test(name)) return '카세트';
  if(/Cooling/i.test(name)) return 'Cooling';
  if(/Pad/i.test(name)) return '리턴스트립';
  if(/Oil/i.test(name)) return '커플링시약';
  if(/애니젠X|Immuno/i.test(name)) return /Eye/i.test(name)?'X/Immuno Eye':'X/Immuno Face';
  if(/애니젠/i.test(name)) return /Eye/i.test(name)?'애니젠 Eye':'애니젠 Face';
  return '기타';
}
function _ym(v){
  if(v instanceof Date) return v.getFullYear()+'-'+String(v.getMonth()+1).padStart(2,'0');
  if(typeof v==='number'){ var d=new Date(Math.round((v-25569)*86400*1000)); return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0'); }
  return String(v||'').slice(0,7);
}
// 노바몰 마감 파일인지 감지 (TIP 시트 없고 주문번호/상품명/품목실결제가 헤더 존재)
function isWomall(wb){
  if(wb.Sheets['TIP']) return false;
  var ws=wb.Sheets[wb.SheetNames[0]]; if(!ws) return false;
  var g=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:null});
  var h=(g[0]||[]).map(function(x){return String(x||'').trim();});
  return h.indexOf('주문번호')>=0 && h.indexOf('상품명')>=0 && h.indexOf('품목실결제가')>=0;
}
function parseWomall(wb){
  var ws=wb.Sheets[wb.SheetNames[0]];
  var g=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:null});
  var H=(g[0]||[]).map(function(x){return String(x||'').trim();});
  function ci(n){ return H.indexOf(n); }
  var cNo=ci('주문번호'),cHosp=ci('주문자 이름'),cQty=ci('구매수량'),cName=ci('상품명'),cAmt=ci('품목실결제가'),cDate=ci('주문일'),cCanc=ci('취소승인일');
  var grpMap={},prodMap={},hospMap={},monMap={},totAmt=0,totQty=0,orders={},minD='',maxD='',cancAmt=0,cancN=0;
  for(var i=1;i<g.length;i++){
    var r=g[i]||[]; if(r[cNo]==null||String(r[cNo]).trim()==='') continue;
    var amt=num(r[cAmt]), qty=num(r[cQty]);
    if(cCanc>=0 && r[cCanc]!=null && String(r[cCanc]).trim()!==''){ cancAmt+=amt; cancN++; continue; } // 취소 제외
    var nm=String(r[cName]||'').trim(), grp=womGrp(nm), ym=_ym(r[cDate]), hosp=String(r[cHosp]||'').trim()||'(미상)';
    totAmt+=amt; totQty+=qty; orders[String(r[cNo])]=1;
    var dstr=fmtDate(r[cDate]); if(dstr){ if(!minD||dstr<minD)minD=dstr; if(!maxD||dstr>maxD)maxD=dstr; }
    if(!grpMap[grp])grpMap[grp]={qty:0,amt:0}; grpMap[grp].qty+=qty; grpMap[grp].amt+=amt;
    if(!prodMap[nm])prodMap[nm]={grp:grp,qty:0,amt:0}; prodMap[nm].qty+=qty; prodMap[nm].amt+=amt;
    if(!hospMap[hosp])hospMap[hosp]={qty:0,amt:0}; hospMap[hosp].qty+=qty; hospMap[hosp].amt+=amt;
    if(!monMap[ym])monMap[ym]={amt:0,qty:0,grps:{}}; monMap[ym].amt+=amt; monMap[ym].qty+=qty;
    monMap[ym].grps[grp]=(monMap[ym].grps[grp]||0)+amt;
  }
  function sortAmt(map){ return Object.keys(map).map(function(k){var o=map[k];return {name:k,grp:o.grp,qty:o.qty,amt:o.amt};}).sort(function(a,b){return b.amt-a.amt;}); }
  var byGrp=WOM_GRPS.filter(function(gp){return grpMap[gp];}).map(function(gp){return {name:gp,qty:grpMap[gp].qty,amt:grpMap[gp].amt};});
  var byMonth=Object.keys(monMap).sort().map(function(k){var o=monMap[k];return {ym:k,amt:o.amt,qty:o.qty,grps:o.grps};});
  return { type:'samplemall', period:{from:minD,to:maxD}, orders:Object.keys(orders).length,
    totAmt:totAmt, totQty:totQty, cancAmt:cancAmt, cancN:cancN,
    byGrp:byGrp, byProduct:sortAmt(prodMap), byHosp:sortAmt(hospMap), byMonth:byMonth,
    uploadedAt:new Date().toISOString() };
}

// ── Trend / 상위구매처 렌더 ──────────────────────────
function _trendCell(v, mode){
  if(v==null || v==='') return '<td class="muted">-</td>';
  if(mode==='chg') return '<td>'+fmtVs(v)+'</td>';
  if(mode==='pct'){ var n=Number(v); return '<td>'+(isNaN(n)?v:Math.round(n*100)+'%')+'</td>'; }
  return '<td>'+fmtWon(v)+'</td>';
}
function _trendMode(label){
  if(/증감|전일비|전주비|YoY/.test(label)) return 'chg';
  if(/목표대비|달성/.test(label)) return 'pct';
  return 'won';
}
function renderTrendBlock(title, blk, isDate){
  if(!blk || !blk.rows || !blk.rows.length) return '';
  var hdr=blk.header.map(function(v){
    if(v==null) return '';
    if(isDate){ var s=fmtDate(v); var m=/(\d{4})-(\d{2})-(\d{2})/.exec(s); if(m) return m[2]+'/'+m[3]; }
    return String(v);
  });
  var h='<div style="margin:6px 0 18px"><div style="font-size:12px;font-weight:700;color:#475569;margin-bottom:6px">'+title+'</div><div class="scroll"><table>';
  h+='<tr><th>구분</th>'+hdr.map(function(c){return '<th>'+esc(c)+'</th>';}).join('')+'</tr>';
  blk.rows.forEach(function(r){
    var mode=_trendMode(r.label);
    h+='<tr><td class="lbl">'+esc(r.label)+'</td>'+r.vals.map(function(v){return _trendCell(v,mode);}).join('')+'</tr>';
  });
  h+='</table></div></div>';
  return h;
}
function renderTopAccounts(tops){

  tops.forEach(function(t){

function handleUpload(input){

  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result, {type:'array', cellDates:true});
      // 노바몰 마감 파일이면 → 국내 진단키트 매출 뷰

        var W=parseWomall(wb);
        if(!W.byProduct.length){ alert('노바몰 데이터를 읽지 못했습니다. 파일을 확인해주세요.'); return; }
        _curView='samplemall'; try{sessionStorage.setItem('cons_view','samplemall');}catch(e2){} _navPush('samplemall'); setTabs(); renderWomall(W);
        _sb.from('consumables_report').upsert({key:'samplemall', data:W, updated_at:new Date().toISOString()}, {onConflict:'key'})
          .then(function(r){ if(r.error) alert('저장 실패: '+r.error.message); else toast('✅ 노바몰 국내 진단키트 매출 갱신 완료 ('+fmtWonFull(W.totAmt)+')'); });
        return;
      }
      var R=parseTIP(wb);
      R.charts=parseAllCharts(wb);
      if(!R.daily || !R.daily.total){ alert('보고서 데이터를 읽지 못했습니다. TIP 시트 형식을 확인해주세요.'); return; }
      renderReport(R);
      // Supabase 저장
      _sb.from('consumables_report').upsert({key:'aura_cons', data:R, updated_at:new Date().toISOString()}, {onConflict:'key'})
        .then(function(r){ if(r.error) alert('저장 실패: '+r.error.message); else { toast('✅ 업로드 완료 — 전 사용자에게 공유되었습니다.'); } });
    }catch(err){ alert('업로드 처리 오류: '+err.message); console.error(err); }
  };
  reader.readAsArrayBuffer(file);
}

    // WT_NAV 부팅: 딥링크 해시 > (reload/back_forward 시) 저장 뷰 > 기본 report
    var initKey='report';
    var hk=(location.hash||'').replace(/^#/,'');
    if(hk==='report'||hk==='samplemall'){ initKey=hk; }
    else{
      var navType='navigate';
      try{ var ne=performance.getEntriesByType('navigation'); if(ne&&ne[0]&&ne[0].type) navType=ne[0].type; }catch(e){}
      if(navType==='reload'||navType==='back_forward'){
        var _v=''; try{_v=sessionStorage.getItem('cons_view')||'';}catch(e){}
        if(_v==='samplemall'||_v==='report') initKey=_v;
      }
    }
    try{ history.replaceState({p:initKey},'','#'+initKey); }catch(e){}
    if(initKey==='samplemall'){ showWomall(false); } else { showReport(false); }
    _wtRenderSwitcher();
  }).catch(function(){ location.replace(CENTRAL); });  /* 프로필 조회 실패: 게이트 실패로 간주 → ret 없이 중앙(signOut 금지) */
}
/* 자체 로그인 화면은 더 이상 표시하지 않는다 — 중앙 로그인으로 통일 */
function showLogin(){ _goCentralWithRet(); }

// ── 부팅 ──────────────────────────────────────────────
// WT_NAV: SSO 토큰해시 등 미지원 해시는 부팅 즉시 제거(딥링크 #report/#womall만 보존)
(function(){ var h=location.hash||''; if(h && h!=='#report' && h!=='#womall'){ try{ history.replaceState(null,'',location.pathname+location.search); }catch(e){} } })();
// WT_NAV: popstate — 피드백 패널 열림 시 닫기만, state 유효 시 해당 뷰(푸시 없이)
window.addEventListener('popstate',function(e){
  var fb=document.getElementById('wt-fb-panel');
  if(fb && fb.style.display==='block'){ fb.style.display='none'; try{ history.pushState({p:_curView},'','#'+_curView); }catch(e2){} return; }
  if(!_currentUser) return;
  if(e.state && e.state.p){ if(e.state.p==='samplemall') showWomall(false); else showReport(false); }
});
// WT_NAV: bfcache 복원 시 세션 없으면 리로드(로그아웃 후 뒤로가기 화면노출 차단)
window.addEventListener('pageshow',function(e){ if(e.persisted){ _sb.auth.getSession().then(function(r){ if(!(r&&r.data&&r.data.session)) location.reload(); }); } });
window.addEventListener('load', function(){
  _sb.auth.getSession().then(function(r){
    if(r.data && r.data.session) enterApp(r.data.session.user);
    else _goCentralWithRet();
  });
});
</script>
<script>function printPDF(){var t=document.title;var r=function(){document.title=t;window.removeEventListener('afterprint',r);};window.addEventListener('afterprint',r);window.print();}</script>
<button id="pdf-fab" onclick="printPDF()" title="이 페이지를 PDF로 추출">📄 PDF</button>
</body>
